<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>橫向控制面板</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f2; /* 乾淨背景 */
            overflow: hidden;
            touch-action: none;
        }

        /* 橫向佈局容器 */
        #container {
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            width: 95vw;
            height: 90vh;
        }

        .row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            gap: 8vw; /* 增加按鈕間距，適合橫向操作 */
        }

        /* 通用按鈕樣式 */
        .btn {
            cursor: pointer;
            transition: filter 0.05s, transform 0.05s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        /* 點擊變深效果 */
        .btn.active {
            filter: brightness(60%) !important;
            transform: scale(0.92);
        }

        /* 圓形按鈕：橫向模式適度縮小以防重疊 */
        .btn-round {
            width: 12vw;
            height: 12vw;
            border-radius: 50%;
        }

        /* 矩形按鈕 */
        .btn-rect {
            width: 18vw;
            height: 10vw;
            border-radius: 10px;
        }

        /* 顏色定義 */
        #btn-blue { background-color: #0066cc; }
        #btn-white { background-color: #ffffff; border: 1px solid #ccc; }
        #btn-yellow { background-color: #ffc107; }
        #btn-gray { background-color: #a0a0a0; }
        #btn-red { background-color: #e62117; }
        #btn-black { background-color: #333333; }
        #btn-green { background-color: #28a745; }
    </style>
</head>
<body>

    <div id="container">
        <div class="row">
            <div class="btn btn-round" id="btn-blue"></div>
            <div class="btn btn-round" id="btn-white"></div>
            <div class="btn btn-round" id="btn-yellow"></div>
        </div>

        <div class="row">
            <div class="btn btn-rect" id="btn-gray"></div>
        </div>

        <div class="row">
            <div class="btn btn-round" id="btn-red"></div>
            <div class="btn btn-rect" id="btn-black"></div>
            <div class="btn btn-round" id="btn-green"></div>
        </div>
    </div>

    <script>
        let audioCtx;
        let audioBuffer;

        // 預加載聲音以確保零延遲
        async function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            try {
                const response = await fetch('click.mp3');
                const arrayBuffer = await response.arrayBuffer();
                audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            } catch (e) {
                console.error("音檔載入失敗", e);
            }
        }

        function playSound() {
            if (!audioBuffer) return;
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioCtx.destination);
            source.start(0);
        }

        const buttons = document.querySelectorAll('.btn');

        buttons.forEach(btn => {
            btn.addEventListener('pointerdown', (e) => {
                initAudio(); // 觸碰時嘗試初始化（瀏覽器安全限制）
                btn.classList.add('active');
                playSound();
            });

            const removeActive = () => btn.classList.remove('active');
            btn.addEventListener('pointerup', removeActive);
            btn.addEventListener('pointerleave', removeActive);
            btn.addEventListener('pointercancel', removeActive);
        });

        // 避免平板長按選取或捲動
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
